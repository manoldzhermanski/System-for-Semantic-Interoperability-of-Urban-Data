services:
  postgres:
    image: postgis/postgis
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ngb
      POSTGRES_PASSWORD: ngb
      POSTGRES_DB: ngb
      
  scorpio:
    image: scorpiobroker/all-in-one-runner:java-latest
    container_name: scorpio
    environment:
      DBHOST: postgres
      QUARKUS_HTTP_LIMITS_MAX_BODY_SIZE: 200M
    ports:
      - "9090:9090"
    depends_on:
      - postgres

  terriamap:
    image: ghcr.io/terriajs/terriamap:latest
    container_name: terriamap
    hostname: terriamap
    ports:
      - "8080:3001"
    volumes:
      - ./terria/config:/app/wwwroot/config
      - ./terria/init:/app/wwwroot/init
      - ./terria/build/TerriaJS/images:/app/wwwroot/build/TerriaJS/images
    restart: unless-stopped

  otp-build:
    image: opentripplanner/opentripplanner:2.8.1
    container_name: otp-build
    volumes:
      - ./otp/data:/var/opentripplanner
    command: >
      --build
      --save
    restart: "no"

  otp:
    image: opentripplanner/opentripplanner:2.8.1
    container_name: opentripplanner
    depends_on:
      - otp-build
    ports:
      - "8081:8080"
    volumes:
      - ./otp/data:/var/opentripplanner
    command: >
      --load
      --serve
    restart: unless-stopped

volumes:
  postgres-data: